<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLEV - 매출 관리 시스템</title>
    <!-- Fonts -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --brand-blue: #2563eb;
            --brand-blue-dark: #1e40af;
            --brand-blue-light: #60a5fa;
            --luxury-glass: rgba(255, 255, 255, 0.95);
            --luxury-border: rgba(0, 0, 0, 0.06);
            --bg-main: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            scroll-behavior: smooth;
            margin: 0;
        }

        .font-brand {
            font-family: 'Outfit', sans-serif;
        }

        /* Glassmorphism Refined for Light Theme */
        .glass-card {
            background: var(--luxury-glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--luxury-border);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.06);
        }

        .glass-card:hover {
            border: 1px solid rgba(37, 99, 235, 0.2);
            box-shadow: 0 20px 40px -15px rgba(37, 99, 235, 0.15);
        }

        /* Animations */
        @keyframes fade-up {
            0% {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .animate-fade-up {
            animation: fade-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        .btn-shine::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--brand-blue);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes pulse-soft {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 0px rgba(59, 130, 246, 0));
            }

            50% {
                transform: scale(1.02);
                filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.2));
            }
        }

        .animate-pulse-soft {
            animation: pulse-soft 4s ease-in-out infinite;
        }

        @keyframes slide-in-right {
            0% {
                transform: translateX(30px);
                opacity: 0;
            }

            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .animate-slide-in {
            animation: slide-in-right 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* ── Mobile Safe Area & Bottom Nav ── */
        .pb-safe {
            padding-bottom: calc(5rem + env(safe-area-inset-bottom));
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(0,0,0,0.06);
            display: flex;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .bottom-nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 10px 0;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #64748b;
            transition: color 0.2s;
            border: none;
            background: none;
            cursor: pointer;
        }

        .bottom-nav-btn.active {
            color: #3b82f6;
        }

        .bottom-nav-btn.new {
            color: white;
            background: #2563eb;
            border-radius: 16px;
            margin: 6px 12px;
            padding: 10px;
        }

        /* ── Drawer (slide from right) ── */
        @keyframes drawer-in {
            from { transform: translateX(100%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }

        .drawer {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: min(85vw, 320px);
            background: #ffffff;
            border-left: 1px solid rgba(0,0,0,0.06);
            z-index: 200;
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            padding-top: calc(2rem + env(safe-area-inset-top));
            animation: drawer-in 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
            overflow-y: auto;
        }

        /* ── Bottom Sheet (slide up) ── */
        @keyframes sheet-up {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .bottom-sheet {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            height: 72vh;
            background: #ffffff;
            border-radius: 2rem 2rem 0 0;
            z-index: 300;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: sheet-up 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ── Full-screen modal on mobile ── */
        @media (max-width: 640px) {
            .form-modal-inner {
                position: fixed !important;
                inset: 0 !important;
                border-radius: 0 !important;
                max-width: 100% !important;
                max-height: 100% !important;
                overflow-y: auto;
                padding: 1.5rem !important;
                padding-top: calc(1.5rem + env(safe-area-inset-top)) !important;
                padding-bottom: calc(1.5rem + env(safe-area-inset-bottom)) !important;
            }
        }

        /* ── Mobile card list ── */
        .mobile-record-card {
            display: none;
        }

        @media (max-width: 767px) {
            .desktop-table { display: none !important; }
            .mobile-record-card { display: flex !important; }
            .main-content { padding-left: 1rem !important; padding-right: 1rem !important; padding-top: 1rem !important; padding-bottom: 6rem !important; }
            .header-desktop { display: none !important; }
            .header-mobile { display: flex !important; }
        }

        @media (min-width: 768px) {
            .bottom-nav { display: none !important; }
            .header-desktop { display: flex !important; }
            .header-mobile { display: none !important; }
        }

        .header-mobile {
            display: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Config & Constants ---
        const LEAD_SOURCES = ['블로그', '당근', '플레이스', '홈페이지', 'SNS', '정읍 톡톡', '지인소개', '영업', '협업', '일당', '기타'];
        const SOURCE_COLORS = {
            '블로그': '#3b82f6', '당근': '#f97316', '플레이스': '#22c55e',
            '홈페이지': '#a855f7', 'SNS': '#ec4899', '정읍 톡톡': '#eab308',
            '지인소개': '#06b6d4', '영업': '#6366f1', '협업': '#8b5cf6', '일당': '#14b8a6', '기타': '#64748b'
        };

        const EXPENSE_CATEGORIES = ['인건비', '유류비', '물품구입비', '식비/식대', '광고/마케팅', '기타'];
        const EXPENSE_COLORS = {
            '인건비': '#f43f5e', '유류비': '#f97316', '물품구입비': '#eab308',
            '식비/식대': '#22c55e', '광고/마케팅': '#3b82f6', '기타': '#64748b'
        };

        // --- Custom Hook: LocalStorage DB ---
        const useSalesDB = () => {
            const [sales, setSales] = useState(() => {
                const saved = localStorage.getItem('CLEV_SALES_DB');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('CLEV_SALES_DB', JSON.stringify(sales));
            }, [sales]);

            const addSale = (sale) => setSales(prev => [sale, ...prev]);
            const deleteSale = (id) => {
                if (confirm('정말 삭제하시겠습니까?')) {
                    setSales(prev => prev.filter(s => s.id !== id));
                }
            };
            const updateSale = (id, updated) => setSales(prev => prev.map(s => s.id === id ? updated : s));
            const importData = (data) => setSales(data);

            return { sales, addSale, deleteSale, updateSale, importData };
        };

        // --- Components ---
        const Icon = ({ name, size = 20, color = "currentColor", className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons({
                        attrs: { size, stroke: color },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, color]);
            return <i data-lucide={name} className={className}></i>;
        };

        // ── BottomNav (mobile only) ──
        const BottomNav = ({ activeTab, onTab, onNewRecord }) => (
            <nav className="bottom-nav">
                <button className={`bottom-nav-btn ${activeTab === 'home' ? 'active' : ''}`} onClick={() => onTab('home')}>
                    <Icon name="home" size={20} />
                    홈
                </button>
                <button className={`bottom-nav-btn ${activeTab === 'calendar' ? 'active' : ''}`} onClick={() => onTab('calendar')}>
                    <Icon name="calendar" size={20} />
                    캘린더
                </button>
                <button className="bottom-nav-btn new" onClick={onNewRecord}>
                    <Icon name="plus" size={22} />
                    신규기록
                </button>
                <button className={`bottom-nav-btn ${activeTab === 'records' ? 'active' : ''}`} onClick={() => onTab('records')}>
                    <Icon name="list" size={20} />
                    내역
                </button>
            </nav>
        );

        // ── MobileHeader with drawer ──
        const MobileHeader = ({ filter, viewMode, setViewMode, applyVat, setApplyVat, handleImport, exportYearlyData, setIsModalOpen, onGoHome, mobileTab, setMobileTab }) => {
            const [drawerOpen, setDrawerOpen] = useState(false);
            return (
                <>
                    <header className="header-mobile items-center justify-between px-4 py-3 border-b border-slate-100 sticky top-0 z-50 bg-white/90 backdrop-blur-md truncate">
                        <button onClick={mobileTab === 'home' || !mobileTab ? onGoHome : () => setMobileTab('home')} className="p-2 text-slate-400 hover:text-slate-900 transition flex items-center gap-1.5 shrink-0">
                            <Icon name="arrow-left" size={20} />
                            {mobileTab !== 'home' && mobileTab && <span className="text-[10px] font-black uppercase text-slate-500 tracking-widest hidden sm:block">뒤로</span>}
                        </button>
                        <div className="flex items-center gap-2 justify-center flex-1 mx-2 overflow-hidden truncate">
                            {mobileTab === 'home' || !mobileTab ? (
                                <>
                                    <img src="assets/logo.png" alt="CLEV" className="w-8 h-8 object-contain shrink-0" style={{filter: 'invert(1)'}} />
                                    <span className="font-brand font-black text-slate-900 text-lg tracking-tighter truncate">CLEV <span className="text-slate-400 font-light">SALES</span></span>
                                </>
                            ) : (
                                <span className="font-brand font-black text-slate-900 text-base truncate">{mobileTab === 'calendar' ? '달력 보기' : '전체 내역'}</span>
                            )}
                        </div>
                        <button onClick={() => setDrawerOpen(true)} className="p-2 text-slate-400 hover:text-slate-900 transition shrink-0">
                            <Icon name="menu" size={22} />
                        </button>
                    </header>

                    {drawerOpen && (
                        <>
                            <div className="fixed inset-0 bg-slate-900/40 z-[199] backdrop-blur-sm" onClick={() => setDrawerOpen(false)} />
                            <div className="drawer">
                                <div className="flex justify-between items-center mb-8">
                                    <span className="font-brand font-black text-slate-900 text-lg">메뉴</span>
                                    <button onClick={() => setDrawerOpen(false)} className="text-slate-500 hover:text-slate-900 p-2"><Icon name="x" size={20} /></button>
                                </div>

                                {/* View Mode */}
                                <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-3">분석 모드</p>
                                <div className="flex bg-slate-50 p-1 rounded-xl border border-slate-200 mb-6 shadow-sm">
                                    <button onClick={() => { setViewMode('monthly'); setDrawerOpen(false); }} className={`flex-1 py-2 rounded-lg text-[10px] font-black transition-all ${viewMode === 'monthly' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>월간</button>
                                    <button onClick={() => { setViewMode('yearly'); setDrawerOpen(false); }} className={`flex-1 py-2 rounded-lg text-[10px] font-black transition-all ${viewMode === 'yearly' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>연간</button>
                                </div>

                                {/* VAT Toggle */}
                                <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-3">세금</p>
                                <button onClick={() => setApplyVat(!applyVat)} className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl border transition-all mb-6 text-xs font-black shadow-sm ${applyVat ? 'bg-emerald-50 border-emerald-200 text-emerald-600' : 'bg-white border-slate-200 text-slate-500'}`}>
                                    <div className={`w-3 h-3 rounded-full ${applyVat ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]' : 'bg-slate-300'}`}></div>
                                    10% 부가세 {applyVat ? '공제 중' : '미적용'}
                                </button>

                                {/* Data Actions */}
                                <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-3">데이터</p>
                                <div className="flex flex-col gap-3">
                                    <label className="cursor-pointer bg-white hover:bg-slate-50 px-4 py-3 rounded-xl border border-slate-200 transition-all text-xs font-black text-slate-500 text-center shadow-sm">
                                        📥 불러오기 <input type="file" className="hidden" onChange={(e) => { handleImport(e); setDrawerOpen(false); }} accept=".json" />
                                    </label>
                                    <button onClick={() => { exportYearlyData(); setDrawerOpen(false); }} className="bg-blue-50/50 hover:bg-blue-50 px-4 py-3 rounded-xl border border-blue-200 transition-all text-xs font-black text-blue-600 shadow-sm">
                                        📁 {filter.year}년 저장
                                    </button>
                                    <button onClick={() => { setIsModalOpen(true); setDrawerOpen(false); }} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-3 rounded-xl font-black text-sm shadow-lg shadow-blue-500/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                                        <Icon name="plus" size={16} /> 신규 기록
                                    </button>
                                </div>
                            </div>
                        </>
                    )}
                </>
            );
        };

        const Card = ({ title, value, sub, icon, trend, colorClass = "from-blue-500 to-indigo-600" }) => (
            <div className="glass-card rounded-[2rem] md:rounded-[2.5rem] p-5 md:p-10 flex flex-col justify-between overflow-hidden relative group transition-all duration-700 hover:-translate-y-2 md:hover:-translate-y-3 hover:shadow-2xl hover:shadow-slate-200/50 border border-slate-200/50 hover:border-blue-500/20">
                <div className={`absolute -top-24 -right-24 w-64 h-64 bg-gradient-to-br ${colorClass} opacity-0 group-hover:opacity-10 blur-[100px] transition-opacity duration-1000`}></div>
                <div className="flex justify-between items-start mb-4 md:mb-8">
                    <div className="p-2.5 md:p-4 bg-slate-50 rounded-xl md:rounded-2xl border border-slate-100 shadow-sm group-hover:bg-blue-50 group-hover:border-blue-200 transition-colors">
                        <Icon name={icon} size={22} className="text-blue-500 group-hover:text-blue-600" />
                    </div>
                    {trend && (
                        <div className={`px-2 py-1 md:px-3 md:py-1.5 rounded-full text-[9px] md:text-[10px] font-black border shadow-sm ${trend > 0 ? 'bg-emerald-50 border-emerald-200 text-emerald-600' : 'bg-rose-50 border-rose-200 text-rose-600'}`}>
                            {trend > 0 ? '▲' : '▼'} {Math.abs(trend)}%
                        </div>
                    )}
                </div>
                <div className="relative z-10">
                    <p className="text-slate-500 font-bold text-[9px] md:text-xs mb-1.5 md:mb-3 uppercase tracking-[0.2em]">{title}</p>
                    <h2 className="text-xl md:text-4xl font-brand font-black text-slate-900 tracking-tighter mb-1 md:mb-2 group-hover:scale-[1.02] origin-left transition-transform duration-500">{value}</h2>
                    <div className="flex items-center gap-2 mt-2 md:mt-4">
                        <div className="h-1 w-6 md:w-8 bg-blue-600 rounded-full"></div>
                        <p className="text-[9px] md:text-[10px] text-gray-600 font-black uppercase tracking-widest">{sub}</p>
                    </div>
                </div>
            </div>
        );


        const SimpleChart = ({ data, type = 'line' }) => {
            if (data.length === 0) return <div className="h-full flex items-center justify-center text-gray-500 font-bold italic">No Data Collected Yet</div>;

            const rawMaxVal = Math.max(...data.map(d => Math.max(d.value, d.profit || 0)), 100);
            const getNiceMax = (val) => {
                const p = Math.pow(10, Math.floor(Math.log10(val)));
                const f = val / p;
                if (f <= 1) return 1 * p;
                if (f <= 2) return 2 * p;
                if (f <= 5) return 5 * p;
                return 10 * p;
            };
            const maxVal = getNiceMax(rawMaxVal);

            const height = 180;
            const width = 600;
            const padding = 45; // Increased padding for Y-labels

            const formatY = (val) => {
                if (val === 0) return '0';
                if (val >= 100000000) return (val / 100000000).toFixed(1).replace(/\.0$/, '') + '억';
                if (val >= 10000) return (val / 10000).toFixed(1).replace(/\.0$/, '') + '만';
                return val.toLocaleString();
            };

            const YGridLines = () => {
                const levels = [0, 0.5, 1];
                return (
                    <g className="y-axis-grid pointer-events-none">
                        {levels.map((level, i) => {
                            const val = maxVal * level;
                            const y = height - padding - (level * (height - padding * 2));
                            return (
                            <g key={i}>
                                <line x1={padding} y1={y} x2={width - padding} y2={y} stroke="#000000" strokeOpacity="0.05" strokeWidth="1" strokeDasharray="4 4" />
                                <text x={padding - 8} y={y + 3} textAnchor="end" fill="#64748b" className="text-[8px] font-bold tracking-tighter opacity-70">{formatY(val)}</text>
                            </g>
                            );
                        })}
                    </g>
                );
            };

            if (type === 'bar') {
                const barWidth = (width - padding * 2) / data.length;
                return (
                    <div className="w-full h-full relative group">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
                            <YGridLines />
                            {data.map((d, i) => {
                                const barHeight = (d.value / maxVal) * (height - padding * 2);
                                const x = padding + i * barWidth;
                                const y = height - padding - barHeight;
                                return (
                                    <g key={i} className="group/bar">
                                        <rect x={x + 8} y={y} width={barWidth - 16} height={barHeight} fill={d.type === 'expense' ? '#f43f5e' : '#3b82f6'} rx="8" className="opacity-30 group-hover/bar:opacity-80 transition-all duration-300" />
                                        <text x={x + barWidth / 2} y={y - 8} textAnchor="middle" fill={d.type === 'expense' ? '#fb7185' : '#60a5fa'} className="text-[7px] font-black opacity-0 group-hover/bar:opacity-100 transition-opacity tracking-tighter">{d.value.toLocaleString()}</text>
                                        <text x={x + barWidth / 2} y={height - 10} textAnchor="middle" fill="#475569" className="text-[8px] font-bold uppercase tracking-widest opacity-60">{d.label}</text>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                );
            }

            const getPoints = (valKey) => data.map((d, i) => {
                const x = (i / (data.length - 1 || 1)) * (width - padding * 2) + padding;
                const val = d[valKey] || (valKey === 'value' ? d.value : 0);
                const y = height - (val / maxVal) * (height - padding * 2) - padding;
                return { x, y };
            });

            const incomePoints = getPoints('value');
            const profitPoints = getPoints('profit');

            const createPath = (points) => points.map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`)).join(' ');
            const createAreaPath = (points) => `${createPath(points)} L ${points[points.length - 1].x} ${height - padding} L ${points[0].x} ${height - padding} Z`;

            return (
                <div className="w-full h-full relative group">
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
                        <defs>
                            <linearGradient id="gradIncome" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#2563eb" stopOpacity="0.2" />
                                <stop offset="100%" stopColor="#2563eb" stopOpacity="0" />
                            </linearGradient>
                            <linearGradient id="gradProfit" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#10b981" stopOpacity="0.3" />
                                <stop offset="100%" stopColor="#10b981" stopOpacity="0" />
                            </linearGradient>
                        </defs>
                        
                        <YGridLines />
                        
                        <path d={createAreaPath(incomePoints)} fill="url(#gradIncome)" className="transition-all duration-700" />
                        <path d={createPath(incomePoints)} fill="none" stroke="#2563eb" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="opacity-20" />

            const total = data.reduce((acc, curr) => acc + curr.value, 0);
            let currentAngle = -90;
            const radius = 70;
            const strokeWidth = 25;
            const center = 100;

            return (
                <div className="flex items-center gap-8 h-full">
                    <svg viewBox="0 0 200 200" className="w-40 h-40 drop-shadow-2xl">
                        {data.map((d, i) => {
                            const percentage = (d.value / total) * 100;
                            const angle = (percentage / 100) * 360;
                            const x1 = center + radius * Math.cos((currentAngle * Math.PI) / 180);
                            const y1 = center + radius * Math.sin((currentAngle * Math.PI) / 180);
                            currentAngle += angle;
                            const x2 = center + radius * Math.cos((currentAngle * Math.PI) / 180);
                            const y2 = center + radius * Math.sin((currentAngle * Math.PI) / 180);
                            const largeArc = angle > 180 ? 1 : 0;

                            return (
                                <path key={i}
                                    d={`M ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2}`}
                                    fill="none" stroke={d.color} strokeWidth={strokeWidth}
                                    className="transition-all duration-500 hover:opacity-80" />
                            );
                        })}

                        x: e.clientX - dragStart.x,

                    });

                const handleMouseUp = () => setIsDragging(false);

                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);

                    window.removeEventListener('mousemove', handleMouseMove);

                    const d = new Date(s.date);
                    return d.getFullYear() === currentYear && d.getMonth() + 1 === currentMonth;
                });
                return {
                    revenue: filtered.reduce((acc, curr) => acc + Number(curr.amount), 0),
                    count: filtered.length,
                    unpaid: filtered.filter(s => s.status === '미입금').length
                };
            }, [sales]);

            // Calculations
            const filteredSales = useMemo(() => {
                return sales.filter(s => {
                    const date = new Date(s.date);
                    let dateMatch = false;
                    if (viewMode === 'yearly') {
                        dateMatch = date.getFullYear() === filter.year;
                    } else {
                        const monthMatch = date.getFullYear() === filter.year && (date.getMonth() + 1) === filter.month;
                        if (selectedDay) {
                            dateMatch = monthMatch && date.getDate() === selectedDay;
                        } else {
                            dateMatch = monthMatch;
                        }
                    }

                    if (!dateMatch) return false;

                    if (searchQuery) {
                        const q = searchQuery.toLowerCase();
                        const clientMatch = s.client && s.client.toLowerCase().includes(q);
                        const nameMatch = s.name && s.name.toLowerCase().includes(q);
                        const memoMatch = s.memo && s.memo.toLowerCase().includes(q);
                        return clientMatch || nameMatch || memoMatch;
                    }
                    return true;
                });
            }, [sales, filter, selectedDay, viewMode, searchQuery]);

            const totalIncome = filteredSales.filter(s => (s.type || 'income') === 'income').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const totalExpense = filteredSales.filter(s => s.type === 'expense').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const vat = Math.floor(totalIncome * 0.1);
            const netProfit = (applyVat ? totalIncome - vat : totalIncome) - totalExpense;
            const unpaidCount = filteredSales.filter(s => s.status === '미입금').length;

            // Trend Data
            const chartData = useMemo(() => {
                const data = [];
                const maxMonths = viewMode === 'monthly' ? 5 : 11;
                const loopLimit = viewMode === 'monthly' ? 5 : 12;

                for (let i = loopLimit; i >= (viewMode === 'monthly' ? 0 : 1); i--) {
                    let month, year;
                    if (viewMode === 'monthly') {
                        const d = new Date();
                        d.setMonth(d.getMonth() - i);
                        month = d.getMonth() + 1;
                        year = d.getFullYear();
                    } else {
                        month = loopLimit - i + 1;
                        year = filter.year;
                    }

                    const monthData = sales.filter(s => {
                        const sd = new Date(s.date);
                        return sd.getFullYear() === year && (sd.getMonth() + 1) === month;
                    });

                    const income = monthData.filter(s => (s.type || 'income') === 'income').reduce((acc, curr) => acc + Number(curr.amount), 0);
                    const expense = monthData.filter(s => s.type === 'expense').reduce((acc, curr) => acc + Number(curr.amount), 0);
                    const vatVal = Math.floor(income * 0.1);
                    const profit = (applyVat ? income - vatVal : income) - expense;

                    data.push({
                        label: `${month}월`,
                        value: income,
                        profit: profit,
                        type: viewMode === 'yearly' ? (income >= expense ? 'income' : 'expense') : 'income'
                    });
                }
                return data;

                const map = {};
                filteredSales.forEach(s => {
                    const categories = Array.isArray(s.category) ? s.category : [s.category];
                    const labels = (s.type === 'expense') ? categories : [s.leadSource || '기타'];
                    labels.forEach(label => {
                        map[label] = (map[label] || 0) + 1;
                    });
                });
                return Object.entries(map)
                    .map(([label, value]) => {
                        const color = EXPENSE_COLORS[label] || SOURCE_COLORS[label] || '#64748b';
                        return { label, value, color };
                    })
                    .sort((a, b) => b.value - a.value);
            }, [filteredSales]);

            const exportYearlyData = () => {
                const yearlyData = sales.filter(s => new Date(s.date).getFullYear() === filter.year);
                if (yearlyData.length === 0) return alert('해당 연도의 데이터가 없습니다.');
                const blob = new Blob([JSON.stringify(yearlyData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `clev-sales-${filter.year}-archive.json`;

                            importData(data);
                            alert('데이터를 성공적으로 불러왔습니다.');
                        }

                };
                reader.readAsText(file);
            };

                    sessionStorage.setItem('clev_auth', 'true');

                                <button onClick={() => setViewMode('yearly')} className={`px-6 py-2 rounded-xl text-[10px] font-black transition-all ${viewMode === 'yearly' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-900'}`}>연간 분석</button>
                            </div>
                            <button onClick={() => setApplyVat(!applyVat)} className={`flex items-center gap-2 px-6 py-3 rounded-2xl border transition-all text-[10px] font-black mr-4 shadow-sm ${applyVat ? 'bg-emerald-50 border-emerald-200 text-emerald-600' : 'bg-white border-slate-200 text-slate-500'}`}>
                                <div className={`w-3 h-3 rounded-full ${applyVat ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-slate-300'}`}></div>
                                10% 부가세 {applyVat ? '공제 중' : '미적용 (간이)'}
                            </button>
                            <label className="cursor-pointer bg-white hover:bg-slate-50 px-6 py-3 rounded-2xl border border-slate-200 transition-all text-xs font-black text-slate-500 shadow-sm">
                                📥 불러오기 <input type="file" className="hidden" onChange={handleImport} accept=".json" />
                            </label>
                            <button onClick={exportYearlyData} className="bg-blue-50/50 hover:bg-blue-50 px-6 py-3 rounded-2xl border border-blue-200 transition-all text-xs font-black text-blue-600 shadow-sm">📁 {filter.year}년 아카이브 저장</button>
                            <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-2xl font-black text-sm shadow-lg shadow-blue-500/20 active:scale-95 transition-all flex items-center gap-2">
                                <Icon name="plus" size={16} /> 신규 기록
                            </button>
                        </div>
                    </header>

                    {/* Mobile Quick Actions */}
                    <div className={`grid grid-cols-3 gap-3 mb-8 animate-fade-up ${mobileTab === 'home' ? 'grid md:hidden' : 'hidden'}`}>
                        <button onClick={() => setIsModalOpen(true)} className="flex flex-col items-center justify-center py-4 px-2 bg-white border border-slate-100 rounded-[2rem] shadow-sm text-blue-600 gap-2 active:scale-95 transition-all">
                            <div className="bg-blue-50 w-12 h-12 rounded-2xl flex items-center justify-center"><Icon name="plus" size={20} /></div>
                            <span className="text-[10px] font-black text-slate-600 uppercase tracking-tight">신규기록</span>
                        </button>
                        <button onClick={() => setMobileTab('calendar')} className="flex flex-col items-center justify-center py-4 px-2 bg-white border border-slate-100 rounded-[2rem] shadow-sm text-emerald-600 gap-2 active:scale-95 transition-all">
                            <div className="bg-emerald-50 w-12 h-12 rounded-2xl flex items-center justify-center"><Icon name="calendar" size={20} /></div>
                            <span className="text-[10px] font-black text-slate-600 uppercase tracking-tight">달력보기</span>
                        </button>
                        <button onClick={() => setMobileTab('records')} className="flex flex-col items-center justify-center py-4 px-2 bg-white border border-slate-100 rounded-[2rem] shadow-sm text-rose-500 gap-2 active:scale-95 transition-all">
                            <div className="bg-rose-50 w-12 h-12 rounded-2xl flex items-center justify-center"><Icon name="list" size={20} /></div>
                            <span className="text-[10px] font-black text-slate-600 uppercase tracking-tight">전체내역</span>
                        </button>
                    </div>

                    {/* Dashboard Cards Title & Swipe Cue (Mobile only) */}
                    <div className={`flex md:hidden justify-between items-end mb-3 ${mobileTab === 'home' ? 'flex' : 'hidden'}`}>
                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none flex items-center gap-1"><Icon name="bar-chart-3" size={12}/> 요약 통계</span>
                        <div className="flex items-center gap-1 text-[10px] text-blue-500 font-black bg-blue-50 px-3 py-1.5 rounded-full animate-pulse-soft">
                            옆으로 넘기기 <Icon name="arrow-right" size={12} />
                        </div>
                    </div>

                    {/* Dashboard Cards (Swipeable on Mobile) */}
                    <div className={`flex overflow-x-auto snap-x snap-mandatory sm:grid sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8 pb-4 md:pb-0 mb-8 md:mb-12 animate-fade-up no-scrollbar -mx-6 px-6 sm:mx-0 sm:px-0 ${mobileTab === 'home' ? 'flex' : 'hidden md:grid'}`} style={{ animationDelay: '0.1s' }}>
                        <div className="snap-center shrink-0 w-[85vw] sm:w-auto h-full"><Card title={selectedDay ? `${filter.month}월 ${selectedDay}일 매출` : viewMode === 'monthly' ? `${filter.month}월 입금액` : `${filter.year}년 총 매출`} value={totalIncome.toLocaleString() + '원'} sub="Gross Total revenue" icon="bar-chart-3" colorClass="from-blue-500 to-blue-700" /></div>
                        <div className="snap-center shrink-0 w-[85vw] sm:w-auto h-full"><Card title="총 지출 내역" value={totalExpense.toLocaleString() + '원'} sub="Total operational costs" icon="credit-card" colorClass="from-rose-500 to-red-700" /></div>
                        <div className="snap-center shrink-0 w-[85vw] sm:w-auto h-full"><Card title="순수익 (실제)" value={netProfit.toLocaleString() + '원'} sub={applyVat ? "VAT 10% Included" : "Net After Expenses"} icon="trending-up" colorClass="from-emerald-500 to-teal-700" /></div>
                        <div className="snap-center shrink-0 w-[85vw] sm:w-auto h-full"><Card title="동일 기간 작업" value={filteredSales.filter(s => (s.type || 'income') === 'income').length + '건'} sub="Finished projects" icon="layers" colorClass="from-gray-700 to-gray-900" /></div>
                    </div>

                    <div className={`grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12 animate-fade-up ${mobileTab === 'home' ? 'grid' : 'hidden md:grid'}`} style={{ animationDelay: '0.2s' }}>
                        {/* Trend Chart */}
                        <div className="lg:col-span-8 glass-card rounded-[2.5rem] p-10">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-xl font-black text-slate-900">{viewMode === 'monthly' ? '수익 및 지출 추이 (6개월)' : `${filter.year}년 월별 금융 현황`}</h2>
                                <div className="text-[10px] text-slate-500 font-bold uppercase tracking-widest flex items-center gap-4">
                                    <div className="flex items-center gap-2"><div className="w-2 h-2 bg-blue-500 rounded-full opacity-50"></div> 매출</div>
                                    <div className="flex items-center gap-2"><div className="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.3)]"></div> 순수익</div>
                                </div>
                            </div>
                            <div className="h-[250px] w-full">
                                <SimpleChart data={chartData} type={viewMode === 'monthly' ? 'line' : 'bar'} />
                            </div>
                        </div>

                        {/* Donut Chart (Lead Source) */}
                        <div className="lg:col-span-4 glass-card rounded-[2.5rem] p-10 flex flex-col">
                            <h2 className="text-xl font-black text-slate-900 mb-8">고객 유입 경로</h2>
                            <div className="flex-grow flex items-center justify-center">
                                <DonutChart data={sourceData} />
                            </div>
                        </div>
                    </div>

                    <div className={`grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12 lg:h-[500px] transition-all duration-500 ${mobileTab !== 'home' ? 'grid' : 'hidden md:grid'}`}>
                        {/* Premium Calendar Filter */}
                        <div className={`relative transition-all duration-500 h-full ${isTableExpanded ? 'lg:col-span-1' : 'lg:col-span-3'} ${mobileTab === 'calendar' ? 'block' : 'hidden md:block'}`}>
                            {/* Toggle Button for Side View */}
                            <button 
                                onClick={() => setIsTableExpanded(!isTableExpanded)}
                                className="absolute -right-4 top-1/2 -translate-y-1/2 z-20 w-8 h-20 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl hover:bg-blue-500 transition-all group hidden lg:flex"
                                title={isTableExpanded ? "Close Detail View" : "Open Detail View"}
                            >
                                <Icon name={isTableExpanded ? "chevron-right" : "chevron-left"} size={16} className="group-hover:scale-125 transition-transform" />
                            </button>
                            <PremiumCalendar
                                year={filter.year}
                                month={filter.month}
                                sales={sales}
                                selectedDay={selectedDay}
                                onDateClick={(day) => {
                                    setSelectedDay(day);
                                    setViewMode('monthly');
                                    if (day !== null) {
                                        setIsDayModalOpen(true);
                                    } else {
                                        setIsDayModalOpen(false);
                                    }
                                }}
                                onViewAll={(type) => {
                                    setSelectedDay(null);
                                    setViewMode('monthly');
                                    setIsDayModalOpen(false);
                                    setListLevel(type);
                                    if (type === 'detail') setIsTableExpanded(true);
                                }}
                                onMonthChange={(delta) => {
                                    let newMonth = filter.month + delta;
                                    let newYear = filter.year;
                                    if (newMonth < 1) { newMonth = 12; newYear--; }
                                    if (newMonth > 12) { newMonth = 1; newYear++; }
                                    setFilter({ month: newMonth, year: newYear });
                                    
                                    // Close modal and reset specific day selection on month navigation
                                    // This ensures user sees the new month calendar first
                                    setSelectedDay(null);
                                    setIsDayModalOpen(false);
                                }}
                                onMonthSelect={(selectedYear, selectedMonth) => {
                                    setFilter({ month: selectedMonth, year: selectedYear });
                                    setSelectedDay(null);
                                    setIsDayModalOpen(false);
                                }}
                            />
                            <DayDetailModal isOpen={isDayModalOpen} onClose={() => setIsDayModalOpen(false)} dateString={selectedDay ? `${filter.month}월 ${selectedDay}일` : `${filter.month}월 전체`} items={filteredSales} deleteSale={deleteSale} />
                        </div>

                        {/* Table View */}
                        {isTableExpanded && (
                            <div className={`lg:col-span-2 glass-card rounded-[2.5rem] overflow-hidden animate-fade-up flex-col h-full ${mobileTab === 'records' ? 'flex' : 'hidden md:flex'}`}>
                                <div className="p-8 lg:p-10 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0 z-10 relative flex-wrap gap-4">
                                    <div className="flex items-center gap-4">
                                        <button 
                                            onClick={() => setIsTableExpanded(false)}
                                            className="p-2.5 bg-white text-slate-400 rounded-xl hover:text-slate-900 hover:bg-slate-100 transition-all flex lg:hidden shadow-sm"
                                        >
                                            <Icon name="x" size={16} />
                                        </button>
                                        <h2 className="text-xl font-black text-slate-900">세부 매출 내역 ({selectedDay ? `${filter.month}월 ${selectedDay}일` : viewMode === 'monthly' ? `${filter.month}월` : `${filter.year}년`})</h2>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="relative group flex-1 w-48 md:w-64">
                                            <input 
                                                type="text" 
                                                placeholder="고객/상호명, 내역 검색..."
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                                className="w-full bg-white border border-slate-200 rounded-xl pl-9 pr-8 py-2 text-xs text-slate-900 focus:outline-none focus:border-blue-500 transition-all font-bold placeholder-slate-400 shadow-sm"
                                            />
                                            <Icon name="search" size={14} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors" />
                                            {searchQuery && (
                                                <button onClick={() => setSearchQuery('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-900 transition-colors"><Icon name="x" size={12}/></button>
                                            )}
                                        </div>
                                        <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest hidden md:block whitespace-nowrap">{filteredSales.length} Records Found</div>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-auto no-scrollbar relative min-h-0">
                                    <table className="w-full border-collapse hidden md:table">
                                        <thead className="bg-white/95 text-[10px] text-slate-500 font-black uppercase tracking-widest text-left sticky top-0 z-20 shadow-sm backdrop-blur-md">
                                        <tr>
                                            <th className="px-10 py-6">일자</th>
                                            {listLevel === 'detail' && <th className="px-10 py-6">유입 경로</th>}
                                            <th className={`px-10 py-6 ${listLevel === 'simple' ? 'w-full' : ''}`}>{listLevel === 'simple' ? '작업내역 (요약)' : '고객/상호명'}</th>
                                            {listLevel === 'detail' && <th className="px-10 py-6">금액</th>}
                                            {listLevel === 'detail' && <th className="px-10 py-6">상태</th>}
                                            {listLevel === 'detail' && <th className="px-10 py-6 text-right">관리</th>}
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm font-medium">
                                        {filteredSales.length === 0 ? (
                                            <tr><td colSpan="6" className="px-10 py-20 text-center text-slate-400 font-bold italic">데이터가 존재하지 않습니다.</td></tr>
                                        ) : (
                                            filteredSales.map((sale, i) => (
                                                <tr key={sale.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors group">
                                                    <td className="px-10 py-6 text-slate-500 font-mono whitespace-nowrap">{sale.date}</td>
                                                    {listLevel === 'detail' && (
                                                    <td className="px-10 py-6">
                                                        <div className="flex flex-wrap gap-1 items-center max-w-[150px]">
                                                            {(sale.type === 'expense' ? (Array.isArray(sale.category) ? sale.category : [sale.category]) : [sale.leadSource || '기타']).map((label, idx) => (
                                                                <div key={idx} className="flex items-center gap-1.5 bg-white px-2 py-1 rounded-lg border border-slate-200 shadow-sm">
                                                                    <div className="w-1.5 h-1.5 rounded-full" style={{ background: (sale.type === 'expense' ? EXPENSE_COLORS[label] : SOURCE_COLORS[label]) || '#64748b' }}></div>
                                                                    <span className="text-[9px] font-black uppercase text-slate-500 whitespace-nowrap">{label}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </td>
                                                    )}
                                                    <td className={`px-10 py-6 font-black ${listLevel === 'simple' ? 'text-slate-600' : 'text-slate-900'}`}>
                                                        <div className="flex items-center gap-3">
                                                            {sale.client}
                                                            {listLevel === 'simple' && (
                                                                <span className="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md border border-slate-200 uppercase tracking-widest">{sale.type === 'expense' ? '지출' : '매출'}</span>
                                                            )}
                                                            {listLevel === 'simple' && sale.status === '미입금' && (
                                                                <span className="text-[9px] font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded-md border border-orange-200">미입금</span>
                                                            )}
                                                        </div>
                                                    </td>
                                                    {listLevel === 'detail' && (
                                                    <td className={`px-10 py-6 font-bold ${sale.type === 'expense' ? 'text-rose-400' : 'text-blue-400'}`}>
                                                        {sale.type === 'expense' ? '-' : ''}{Number(sale.amount).toLocaleString()}원
                                                    </td>
                                                    )}
                                                    {listLevel === 'detail' && (
                                                    <td className="px-10 py-6">
                                                        <span className={`text-[10px] font-black ${sale.type === 'expense' ? 'text-slate-400' :
                                                                sale.status === '입금완료' ? 'text-emerald-500' :
                                                                    sale.status === '미입금' ? 'text-orange-500' : 'text-slate-400'
                                                            }`}>{sale.type === 'expense' ? '지출' : sale.status}</span>
                                                    </td>
                                                    )}
                                                    {listLevel === 'detail' && (
                                                    <td className="px-10 py-6 text-right">
                                                        <button onClick={() => deleteSale(sale.id)} className="text-slate-400 hover:text-red-500 transition-colors">
                                                            <Icon name="trash-2" size={16} />
                                                        </button>
                                                    </td>
                                                    )}
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                                {/* Mobile Card List */}
                                <div className="md:hidden p-6 space-y-4 pb-24">
                                    {filteredSales.length === 0 ? (
                                        <div className="text-center py-20 text-slate-400 font-bold italic">데이터가 존재하지 않습니다.</div>
                                    ) : (
                                        filteredSales.map(sale => (
                                            <div key={sale.id} className="bg-white border border-slate-100 rounded-2xl p-4 flex flex-col gap-3 group transition-all shadow-sm">
                                                <div className="flex justify-between items-start">
                                                    <div className="flex items-center gap-2">
                                                        <span className={`text-[10px] font-black px-2.5 py-1 rounded-lg uppercase tracking-widest ${sale.type==='expense'?'bg-rose-50 text-rose-600 border border-rose-200':'bg-blue-50 text-blue-600 border border-blue-200'}`}>
                                                            {sale.type==='expense'?'지출':'매출'}
                                                        </span>
                                                        {sale.type!=='expense'&&<span className={`text-[10px] font-black ${sale.status==='입금완료'?'text-emerald-500':sale.status==='미입금'?'text-orange-500':'text-slate-400'}`}>{sale.status}</span>}
                                                    </div>
                                                    {listLevel === 'detail' && (
                                                        <button onClick={()=>deleteSale(sale.id)} className="text-slate-400 hover:text-red-500 p-1.5 rounded-lg hover:bg-slate-50 opacity-50 group-hover:opacity-100 transition-all">
                                                            <Icon name="trash-2" size={15} />
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="flex justify-between items-end gap-2">
                                                    <div>
                                                        <h3 className="text-sm font-black text-slate-900 mb-2">{sale.client}</h3>
                                                        <div className="flex flex-wrap gap-1">
                                                            <span className="text-[10px] font-bold text-slate-500 bg-slate-50 border border-slate-100 px-2 py-0.5 rounded-full whitespace-nowrap">{sale.date}</span>
                                                            {listLevel === 'detail' && (sale.type==='expense'?(Array.isArray(sale.category)?sale.category:[sale.category]):[sale.leadSource||'기타']).map((label,idx)=>(
                                                                <span key={idx} className="text-[10px] font-bold text-slate-500 bg-slate-50 border border-slate-100 px-2 py-0.5 rounded-full whitespace-nowrap">#{label}</span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    {listLevel === 'detail' && (
                                                        <span className={`text-lg font-brand font-black shrink-0 ${sale.type==='expense'?'text-rose-500':'text-blue-600'}`}>
                                                            {sale.type==='expense'?'-':''}{Number(sale.amount).toLocaleString()}원
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                        )}
                    </div>

                    {/* Footer */}
                    <footer className={`mt-20 text-center opacity-60 ${mobileTab === 'home' ? 'block' : 'hidden md:block'}`}>
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em]">CLEV Maestro Admin v1.2 &copy; 2026</p>
                    </footer>
                </div>
                <FormModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} onSave={(data) => addSale({ ...data, id: Date.now() })} />
                {/* Mobile Bottom Nav */}
                <BottomNav
                    activeTab={mobileTab}
                    onTab={(tab) => {
                        setMobileTab(tab);
                        if (tab === 'calendar') { setIsTableExpanded(false); setIsDayModalOpen(false); }
                        if (tab === 'records') { setIsTableExpanded(true); setIsDayModalOpen(false); }
                    }}
                    onNewRecord={() => setIsModalOpen(true)}
                />
            </>
        );
    };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
