<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLEV - 매출 관리 시스템</title>
    <!-- Fonts -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --brand-blue: #2563eb;
            --brand-blue-dark: #1e40af;
            --brand-blue-light: #60a5fa;
            --luxury-glass: rgba(255, 255, 255, 0.05);
            --luxury-border: rgba(255, 255, 255, 0.08);
            --bg-main: #0a0a0c;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            scroll-behavior: smooth;
            margin: 0;
        }

        .font-brand {
            font-family: 'Outfit', sans-serif;
        }

        /* Glassmorphism Refined for Light Theme */
        .glass-card {
            background: var(--luxury-glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--luxury-border);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.6);
        }

        .glass-card:hover {
            border: 1px solid rgba(37, 99, 235, 0.2);
            box-shadow: 0 20px 40px -15px rgba(37, 99, 235, 0.1);
        }

        /* Animations */
        @keyframes fade-up {
            0% {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .animate-fade-up {
            animation: fade-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        .btn-shine::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--brand-blue);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes pulse-soft {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 0px rgba(59, 130, 246, 0));
            }

            50% {
                transform: scale(1.02);
                filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.2));
            }
        }

        .animate-pulse-soft {
            animation: pulse-soft 4s ease-in-out infinite;
        }

        @keyframes slide-in-right {
            0% {
                transform: translateX(30px);
                opacity: 0;
            }

            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .animate-slide-in {
            animation: slide-in-right 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Config & Constants ---
        const LEAD_SOURCES = ['블로그', '당근', '플레이스', '홈페이지', 'SNS', '정읍 톡톡', '지인소개', '영업', '협업', '일당', '기타'];
        const SOURCE_COLORS = {
            '블로그': '#3b82f6', '당근': '#f97316', '플레이스': '#22c55e',
            '홈페이지': '#a855f7', 'SNS': '#ec4899', '정읍 톡톡': '#eab308',
            '지인소개': '#06b6d4', '영업': '#6366f1', '협업': '#8b5cf6', '일당': '#14b8a6', '기타': '#64748b'
        };

        const EXPENSE_CATEGORIES = ['인건비', '유류비', '물품구입비', '식비/식대', '광고/마케팅', '기타'];
        const EXPENSE_COLORS = {
            '인건비': '#f43f5e', '유류비': '#f97316', '물품구입비': '#eab308',
            '식비/식대': '#22c55e', '광고/마케팅': '#3b82f6', '기타': '#64748b'
        };

        // --- Custom Hook: LocalStorage DB ---
        const useSalesDB = () => {
            const [sales, setSales] = useState(() => {
                const saved = localStorage.getItem('CLEV_SALES_DB');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('CLEV_SALES_DB', JSON.stringify(sales));
            }, [sales]);

            const addSale = (sale) => setSales(prev => [sale, ...prev]);
            const deleteSale = (id) => {
                if (confirm('정말 삭제하시겠습니까?')) {
                    setSales(prev => prev.filter(s => s.id !== id));
                }
            };
            const updateSale = (id, updated) => setSales(prev => prev.map(s => s.id === id ? updated : s));
            const importData = (data) => setSales(data);

            return { sales, addSale, deleteSale, updateSale, importData };
        };

        // --- Components ---
        const Icon = ({ name, size = 20, color = "currentColor", className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons({
                        attrs: { size, stroke: color },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, color]);
            return <i data-lucide={name} className={className}></i>;
        };

        const Card = ({ title, value, sub, icon, trend, colorClass = "from-blue-500 to-indigo-600" }) => (
            <div className="glass-card rounded-[2.5rem] p-10 flex flex-col justify-between overflow-hidden relative group transition-all duration-700 hover:-translate-y-3 hover:shadow-[0_40px_80px_-20px_rgba(0,0,0,0.5)] border border-white/5 hover:border-blue-500/20">
                <div className={`absolute -top-24 -right-24 w-64 h-64 bg-gradient-to-br ${colorClass} opacity-0 group-hover:opacity-10 blur-[100px] transition-opacity duration-1000`}></div>
                <div className="flex justify-between items-start mb-8">
                    <div className="p-4 bg-white/5 rounded-2xl border border-white/5 shadow-inner group-hover:bg-blue-600/10 group-hover:border-blue-500/20 transition-colors">
                        <Icon name={icon} size={28} className="text-blue-500 group-hover:text-blue-400" />
                    </div>
                    {trend && (
                        <div className={`px-3 py-1.5 rounded-full text-[10px] font-black border ${trend > 0 ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-500' : 'bg-rose-500/10 border-rose-500/20 text-rose-500'}`}>
                            {trend > 0 ? '▲' : '▼'} {Math.abs(trend)}%
                        </div>
                    )}
                </div>
                <div>
                    <p className="text-gray-500 font-bold text-xs mb-3 uppercase tracking-[0.2em]">{title}</p>
                    <h2 className="text-4xl font-brand font-black text-white tracking-tighter mb-2 group-hover:scale-[1.02] origin-left transition-transform duration-500">{value}</h2>
                    <div className="flex items-center gap-2 mt-4">
                        <div className="h-1 w-8 bg-blue-600 rounded-full"></div>
                        <p className="text-[10px] text-gray-600 font-black uppercase tracking-widest">{sub}</p>
                    </div>
                </div>
            </div>
        );

        const SimpleChart = ({ data, type = 'line' }) => {
            if (data.length === 0) return <div className="h-full flex items-center justify-center text-gray-500 font-bold italic">No Data Collected Yet</div>;

            const rawMaxVal = Math.max(...data.map(d => Math.max(d.value, d.profit || 0)), 100);
            const getNiceMax = (val) => {
                const p = Math.pow(10, Math.floor(Math.log10(val)));
                const f = val / p;
                if (f <= 1) return 1 * p;
                if (f <= 2) return 2 * p;
                if (f <= 5) return 5 * p;
                return 10 * p;
            };
            const maxVal = getNiceMax(rawMaxVal);

            const height = 180;
            const width = 600;
            const padding = 45; // Increased padding for Y-labels

            const formatY = (val) => {
                if (val === 0) return '0';
                if (val >= 100000000) return (val / 100000000).toFixed(1).replace(/\.0$/, '') + '억';
                if (val >= 10000) return (val / 10000).toFixed(1).replace(/\.0$/, '') + '만';
                return val.toLocaleString();
            };

            const YGridLines = () => {
                const levels = [0, 0.5, 1];
                return (
                    <g className="y-axis-grid pointer-events-none">
                        {levels.map((level, i) => {
                            const val = maxVal * level;
                            const y = height - padding - (level * (height - padding * 2));
                            return (
                                <g key={i}>
                                    <line x1={padding} y1={y} x2={width - padding} y2={y} stroke="#ffffff" strokeOpacity="0.05" strokeWidth="1" strokeDasharray="4 4" />
                                    <text x={padding - 8} y={y + 3} textAnchor="end" fill="#64748b" className="text-[8px] font-bold tracking-tighter opacity-70">{formatY(val)}</text>
                                </g>
                            );
                        })}
                    </g>
                );
            };

            if (type === 'bar') {
                const barWidth = (width - padding * 2) / data.length;
                return (
                    <div className="w-full h-full relative group">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
                            <YGridLines />
                            {data.map((d, i) => {
                                const barHeight = (d.value / maxVal) * (height - padding * 2);
                                const x = padding + i * barWidth;
                                const y = height - padding - barHeight;
                                return (
                                    <g key={i} className="group/bar">
                                        <rect x={x + 8} y={y} width={barWidth - 16} height={barHeight} fill={d.type === 'expense' ? '#f43f5e' : '#3b82f6'} rx="8" className="opacity-30 group-hover/bar:opacity-80 transition-all duration-300" />
                                        <text x={x + barWidth / 2} y={y - 8} textAnchor="middle" fill={d.type === 'expense' ? '#fb7185' : '#60a5fa'} className="text-[7px] font-black opacity-0 group-hover/bar:opacity-100 transition-opacity tracking-tighter">{d.value.toLocaleString()}</text>
                                        <text x={x + barWidth / 2} y={height - 10} textAnchor="middle" fill="#475569" className="text-[8px] font-bold uppercase tracking-widest opacity-60">{d.label}</text>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                );
            }

            const getPoints = (valKey) => data.map((d, i) => {
                const x = (i / (data.length - 1 || 1)) * (width - padding * 2) + padding;
                const val = d[valKey] || (valKey === 'value' ? d.value : 0);
                const y = height - (val / maxVal) * (height - padding * 2) - padding;
                return { x, y };
            });

            const incomePoints = getPoints('value');
            const profitPoints = getPoints('profit');

            const createPath = (points) => points.map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`)).join(' ');
            const createAreaPath = (points) => `${createPath(points)} L ${points[points.length - 1].x} ${height - padding} L ${points[0].x} ${height - padding} Z`;

            return (
                <div className="w-full h-full relative group">
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
                        <defs>
                            <linearGradient id="gradIncome" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#2563eb" stopOpacity="0.2" />
                                <stop offset="100%" stopColor="#2563eb" stopOpacity="0" />
                            </linearGradient>
                            <linearGradient id="gradProfit" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#10b981" stopOpacity="0.3" />
                                <stop offset="100%" stopColor="#10b981" stopOpacity="0" />
                            </linearGradient>
                        </defs>
                        
                        <YGridLines />
                        
                        <path d={createAreaPath(incomePoints)} fill="url(#gradIncome)" className="transition-all duration-700" />
                        <path d={createPath(incomePoints)} fill="none" stroke="#2563eb" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="opacity-20" />
                        
                        <path d={createAreaPath(profitPoints)} fill="url(#gradProfit)" className="transition-all duration-700" />
                        <path d={createPath(profitPoints)} fill="none" stroke="#10b981" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className="drop-shadow-[0_0_12px_rgba(16,185,129,0.4)]" />

                        {data.map((d, i) => {
                            const p = profitPoints[i];
                            const ip = incomePoints[i];
                            return (
                                <g key={i} className="group/dot cursor-pointer">
                                    <circle cx={ip.x} cy={ip.y} r="3" fill="#0a0a0c" stroke="#2563eb" strokeWidth="1.5" opacity="0.2" />
                                    <circle cx={p.x} cy={p.y} r="5" fill="#0a0a0c" stroke="#10b981" strokeWidth="2.5" className="transition-all duration-300 group-hover/dot:r-7 group-hover/dot:stroke-white" />
                                    <text x={p.x} y={p.y - 15} textAnchor="middle" fill="#34d399" className="text-[9px] font-black opacity-0 group-hover/dot:opacity-100 transition-all transform translate-y-2 group-hover/dot:translate-y-0 tracking-tighter">
                                        {d.profit?.toLocaleString()}
                                    </text>
                                    <text x={ip.x} y={height - 10} textAnchor="middle" fill="#475569" className="text-[8px] font-bold uppercase tracking-widest opacity-60">{d.label}</text>
                                </g>
                            );
                        })}
                    </svg>
                </div>
            );
        };

        const PremiumCalendar = ({ year, month, sales, onDateClick, selectedDay, onMonthChange, onMonthSelect, onViewAll }) => {
            const [lastSelected, setLastSelected] = useState(null);

            useEffect(() => {
                setLastSelected(null);
            }, [month, year]);

            const daysInMonth = new Date(year, month, 0).getDate();
            const firstDay = new Date(year, month - 1, 1).getDay();
            const days = [];

            // Fill empty slots
            for (let i = 0; i < firstDay; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);

            const hasWork = (day) => {
                if (!day) return false;
                const dStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                return sales.some(s => s.date === dStr);
            };

            const isToday = (day) => {
                const today = new Date();
                return today.getFullYear() === year && today.getMonth() + 1 === month && today.getDate() === day;
            };

            return (
                <div className="glass-card rounded-[2rem] p-5 lg:p-6 flex flex-col h-full relative overflow-hidden group">
                    <div className="absolute -top-10 -right-10 w-40 h-40 bg-blue-600/5 blur-3xl group-hover:bg-blue-600/10 transition-colors pointer-events-none"></div>
                    <div className="flex justify-between items-center mb-4 relative z-10">
                        <div className="flex items-baseline gap-1 relative z-20">
                            <div className="relative group">
                                <select 
                                    className="appearance-none bg-transparent text-xl font-brand font-black text-white hover:text-blue-400 cursor-pointer pr-4 focus:outline-none"
                                    value={year}
                                    onChange={(e) => onMonthSelect && onMonthSelect(parseInt(e.target.value, 10), month)}
                                >
                                    {Array.from({length: 11}, (_, i) => new Date().getFullYear() - 5 + i).map(y => <option key={y} value={y} className="bg-[#0a0a0c] text-base">{y}년</option>)}
                                </select>
                                <Icon name="chevron-down" size={14} className="absolute right-0 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none group-hover:text-blue-400 transition-colors shadow-sm" />
                            </div>
                            
                            <div className="relative group ml-1">
                                <select 
                                    className="appearance-none bg-transparent text-xl font-brand font-black text-white hover:text-blue-400 cursor-pointer pr-4 focus:outline-none"
                                    value={month}
                                    onChange={(e) => onMonthSelect && onMonthSelect(year, parseInt(e.target.value, 10))}
                                >
                                    {Array.from({length: 12}, (_, i) => i + 1).map(m => <option key={m} value={m} className="bg-[#0a0a0c] text-base">{m}월</option>)}
                                </select>
                                <Icon name="chevron-down" size={14} className="absolute right-0 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none group-hover:text-blue-400 transition-colors shadow-sm" />
                            </div>
                        </div>
                        <div className="flex gap-2 items-center">
                            <button onClick={() => onMonthChange(-1)} className="p-1 min-w-[28px] h-[28px] flex items-center justify-center bg-white/5 text-gray-400 rounded-lg hover:bg-blue-600 hover:text-white transition-all active:scale-95"><Icon name="chevron-left" size={14} /></button>
                            <div className="flex bg-[#0a0a0c]/80 p-0.5 rounded-lg border border-white/10 backdrop-blur-sm">
                                <button 
                                    onClick={() => onViewAll && onViewAll('simple')}
                                    className={`px-3 py-1 rounded-md text-[10px] font-black transition-all active:scale-95 ${selectedDay === null ? 'bg-blue-600 text-white shadow-sm' : 'text-gray-400 hover:text-white hover:bg-white/10'}`}
                                >
                                    요약보기
                                </button>
                                <button 
                                    onClick={() => onViewAll && onViewAll('detail')}
                                    className="px-3 py-1 rounded-md text-[10px] font-black transition-all active:scale-95 text-gray-400 hover:text-white hover:bg-white/10 border-l border-white/5 ml-0.5 pl-3.5"
                                >
                                    상세보기
                                </button>
                            </div>
                            <button onClick={() => onMonthChange(1)} className="p-1 min-w-[28px] h-[28px] flex items-center justify-center bg-white/5 text-gray-400 rounded-lg hover:bg-blue-600 hover:text-white transition-all active:scale-95"><Icon name="chevron-right" size={14} /></button>
                        </div>
                    </div>

                    <div className="grid grid-cols-7 gap-0.5 mb-1">
                        {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map(d => (
                            <div key={d} className="text-center text-[9px] font-black text-gray-600 uppercase py-1">{d}</div>
                        ))}
                    </div>

                    <div className="grid grid-cols-7 gap-0.5 flex-grow">
                        {days.map((day, i) => {
                            const dStr = day ? `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}` : null;
                            const daySales = dStr ? sales.filter(s => s.date === dStr) : [];
                            const hasIncome = daySales.some(s => (s.type || 'income') === 'income');
                            const hasExpense = daySales.some(s => s.type === 'expense');

                            return (
                                <div key={i} className="h-10 md:h-12 lg:h-[52px] relative flex items-center justify-center">
                                    {day && (
                                        <button
                                            onClick={() => onDateClick(day)}
                                            className={`w-full h-full rounded-lg text-[10px] font-bold transition-all flex flex-col items-center justify-center gap-0.5 group/day border
                                                ${selectedDay === day ? 'bg-blue-600 text-white border-blue-400 shadow-lg scale-105 z-10' :
                                                    isToday(day) ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' :
                                                        'bg-white/5 text-gray-500 border-transparent hover:bg-white/10 hover:text-white'}`}
                                        >
                                            <span className={selectedDay === day ? 'font-black' : ''}>{day}</span>
                                            <div className="flex gap-1">
                                                {hasIncome && <div className="w-3 h-[2px] bg-blue-500 rounded-full shadow-[0_0_4px_rgba(59,130,246,0.5)]"></div>}
                                                {hasExpense && <div className="w-3 h-[2px] bg-rose-500 rounded-full shadow-[0_0_4px_rgba(244,63,94,0.5)]"></div>}
                                            </div>
                                        </button>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    <div className="mt-4 pt-3 border-t border-white/5 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2">
                                <div className="w-4 h-[2px] rounded-full bg-blue-500"></div>
                                <span className="text-[8px] font-black text-gray-500 uppercase tracking-widest">Income</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-4 h-[2px] rounded-full bg-rose-500"></div>
                                <span className="text-[8px] font-black text-gray-500 uppercase tracking-widest">Expense</span>
                            </div>
                        </div>
                        {selectedDay && <span className="text-[8px] font-black text-blue-600 uppercase tracking-widest">Day {selectedDay} Active</span>}
                    </div>
                </div>
            );
        };

        const DonutChart = ({ data }) => {
            if (data.length === 0) return <div className="h-full flex items-center justify-center text-gray-500 text-xs italic">데이터 없음</div>;

            const total = data.reduce((acc, curr) => acc + curr.value, 0);
            let currentAngle = -90;
            const radius = 70;
            const strokeWidth = 25;
            const center = 100;

            return (
                <div className="flex items-center gap-8 h-full">
                    <svg viewBox="0 0 200 200" className="w-40 h-40 drop-shadow-2xl">
                        {data.map((d, i) => {
                            const percentage = (d.value / total) * 100;
                            const angle = (percentage / 100) * 360;
                            const x1 = center + radius * Math.cos((currentAngle * Math.PI) / 180);
                            const y1 = center + radius * Math.sin((currentAngle * Math.PI) / 180);
                            currentAngle += angle;
                            const x2 = center + radius * Math.cos((currentAngle * Math.PI) / 180);
                            const y2 = center + radius * Math.sin((currentAngle * Math.PI) / 180);
                            const largeArc = angle > 180 ? 1 : 0;

                            return (
                                <path key={i}
                                    d={`M ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2}`}
                                    fill="none" stroke={d.color} strokeWidth={strokeWidth}
                                    className="transition-all duration-500 hover:opacity-80" />
                            );
                        })}
                        <text x="100" y="105" textAnchor="middle" fill="white" className="text-lg font-black font-brand">TOP 1</text>
                        <text x="100" y="125" textAnchor="middle" fill="#64748b" className="text-[8px] font-black uppercase tracking-widest">{data[0]?.label}</text>
                    </svg>

                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-md animate-fade-up">
                            <div className="glass-card rounded-[2.5rem] w-full max-w-sm p-10 relative bg-[#0a0a0c]/80 shadow-2xl flex flex-col items-center">
                                <button onClick={() => { setShowAuth(false); setPassword(''); setIsChangeMode(false); }} className="absolute top-6 right-6 text-gray-500 hover:text-white transition-colors"><Icon name="x" size={20}/></button>
                                <div className={`w-16 h-16 flex items-center justify-center rounded-2xl mb-6 transition-colors ${success ? 'bg-emerald-500/10 text-emerald-500' : 'bg-blue-500/10 text-blue-500'}`}>
                                    <Icon name={success ? "check" : isChangeMode ? "key" : "lock"} size={28} />
                                </div>
                                <h3 className="text-xl font-brand font-black text-white mb-2 tracking-[0.2em] uppercase">{isChangeMode ? 'Change PIN' : 'Admin Auth'}</h3>
                                <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-8 text-center leading-relaxed">
                                    {success ? '비밀번호가 성공적으로 변경되었습니다.' : (isChangeMode ? '새로운 관리자 코드를 설정합니다.' : '접근 권한이 필요합니다. 관리자 코드를 입력해주세요.')}
                                </p>
                                
                                <form className="w-full flex flex-col gap-5" onSubmit={handleAuth}>
                                    {!success && (
                                        <>
                                            <div className="relative">
                                                <input 
                                                    type="password" 
                                                    autoFocus
                                                    placeholder={isChangeMode ? "CURRENT PIN" : "PIN CODE"}
                                                    value={password}
                                                    onChange={(e) => setPassword(e.target.value)}
                                                    className={`w-full bg-[#0a0a0c]/80 border ${error ? 'border-red-500 text-red-500' : 'border-white/10 text-white focus:border-blue-500'} rounded-2xl px-6 py-4 text-center tracking-[0.5em] font-black focus:outline-none transition-colors shadow-inner`}
                                                />
                                                {error && <p className="absolute -bottom-6 left-1/2 -translate-x-1/2 text-red-500 text-[9px] font-black uppercase tracking-widest animate-[shake_0.5s_ease-in-out]">Incorrect Code</p>}
                                            </div>
                                            {isChangeMode && (
                                                <div className="relative">
                                                    <input 
                                                        type="password" 
                                                        placeholder="NEW PIN"
                                                        value={newPassword}
                                                        onChange={(e) => setNewPassword(e.target.value)}
                                                        className="w-full bg-[#0a0a0c]/80 border border-white/10 text-white focus:border-blue-500 rounded-2xl px-6 py-4 text-center tracking-[0.5em] font-black focus:outline-none transition-colors shadow-inner"
                                                    />
                                                </div>
                                            )}
                                            <button 
                                                type="submit"
                                                className={`w-full mt-2 px-6 py-4 ${isChangeMode ? 'bg-indigo-600 hover:bg-indigo-500' : 'bg-blue-600 hover:bg-blue-500'} text-white rounded-2xl text-xs font-black uppercase tracking-[0.2em] transition-all shadow-lg active:scale-95`}
                                            >
                                                {isChangeMode ? 'Update PIN' : 'Unlock'}
                                            </button>
                                            
                                            <button 
                                                type="button" 
                                                onClick={() => { setIsChangeMode(!isChangeMode); setPassword(''); setNewPassword(''); setError(false); }}
                                                className="text-[9px] font-black text-gray-600 hover:text-white uppercase tracking-widest mt-2 transition-colors"
                                            >
                                                {isChangeMode ? 'Cancel' : 'Change PIN Code'}
                                            </button>
                                        </>
                                    )}
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const { sales, addSale, deleteSale, importData } = useSalesDB();
            const [view, setView] = useState('start'); // 'start' or 'dashboard'
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isDayModalOpen, setIsDayModalOpen] = useState(false);
            const [isTableExpanded, setIsTableExpanded] = useState(true);
            const [filter, setFilter] = useState({ month: new Date().getMonth() + 1, year: new Date().getFullYear() });
            const [selectedDay, setSelectedDay] = useState(null); // specific day selection
            const [viewMode, setViewMode] = useState('monthly'); // 'monthly' or 'yearly'
            const [applyVat, setApplyVat] = useState(false); // Tax status toggle
            const [listLevel, setListLevel] = useState('detail'); // 'simple' or 'detail'
            const [searchQuery, setSearchQuery] = useState(''); // Search query

            // Quick Stats for Start Page
            const startStats = useMemo(() => {
                const currentMonth = new Date().getMonth() + 1;
                const currentYear = new Date().getFullYear();
                const filtered = sales.filter(s => {
                    const d = new Date(s.date);
                    return d.getFullYear() === currentYear && d.getMonth() + 1 === currentMonth;
                });
                return {
                    revenue: filtered.reduce((acc, curr) => acc + Number(curr.amount), 0),
                    count: filtered.length,
                    unpaid: filtered.filter(s => s.status === '미입금').length
                };
            }, [sales]);

            // Calculations
            const filteredSales = useMemo(() => {
                return sales.filter(s => {
                    const date = new Date(s.date);
                    let dateMatch = false;
                    if (viewMode === 'yearly') {
                        dateMatch = date.getFullYear() === filter.year;
                    } else {
                        const monthMatch = date.getFullYear() === filter.year && (date.getMonth() + 1) === filter.month;
                        if (selectedDay) {
                            dateMatch = monthMatch && date.getDate() === selectedDay;
                        } else {
                            dateMatch = monthMatch;
                        }
                    }

                    if (!dateMatch) return false;

                    if (searchQuery) {
                        const q = searchQuery.toLowerCase();
                        const clientMatch = s.client && s.client.toLowerCase().includes(q);
                        const nameMatch = s.name && s.name.toLowerCase().includes(q);
                        const memoMatch = s.memo && s.memo.toLowerCase().includes(q);
                        return clientMatch || nameMatch || memoMatch;
                    }
                    return true;
                });
            }, [sales, filter, selectedDay, viewMode, searchQuery]);

            const totalIncome = filteredSales.filter(s => (s.type || 'income') === 'income').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const totalExpense = filteredSales.filter(s => s.type === 'expense').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const vat = Math.floor(totalIncome * 0.1);
            const netProfit = (applyVat ? totalIncome - vat : totalIncome) - totalExpense;
            const unpaidCount = filteredSales.filter(s => s.status === '미입금').length;

            // Trend Data
            const chartData = useMemo(() => {
                const data = [];
                const maxMonths = viewMode === 'monthly' ? 5 : 11;
                const loopLimit = viewMode === 'monthly' ? 5 : 12;

                for (let i = loopLimit; i >= (viewMode === 'monthly' ? 0 : 1); i--) {
                    let month, year;
                    if (viewMode === 'monthly') {
                        const d = new Date();
                        d.setMonth(d.getMonth() - i);
                        month = d.getMonth() + 1;
                        year = d.getFullYear();
                    } else {
                        month = loopLimit - i + 1;
                        year = filter.year;
                    }

                    const monthData = sales.filter(s => {
                        const sd = new Date(s.date);
                        return sd.getFullYear() === year && (sd.getMonth() + 1) === month;
                    });

                    const income = monthData.filter(s => (s.type || 'income') === 'income').reduce((acc, curr) => acc + Number(curr.amount), 0);
                    const expense = monthData.filter(s => s.type === 'expense').reduce((acc, curr) => acc + Number(curr.amount), 0);
                    const vatVal = Math.floor(income * 0.1);
                    const profit = (applyVat ? income - vatVal : income) - expense;

                    data.push({
                        label: `${month}월`,
                        value: income,
                        profit: profit,
                        type: viewMode === 'yearly' ? (income >= expense ? 'income' : 'expense') : 'income'
                    });
                }
                return data;
            }, [sales, filter.year, viewMode, applyVat]);

            // Pie/Donut Data (Combined Income/Expense Distribution)
            const sourceData = useMemo(() => {
                const map = {};
                filteredSales.forEach(s => {
                    const categories = Array.isArray(s.category) ? s.category : [s.category];
                    const labels = (s.type === 'expense') ? categories : [s.leadSource || '기타'];
                    labels.forEach(label => {
                        map[label] = (map[label] || 0) + 1;
                    });
                });
                return Object.entries(map)
                    .map(([label, value]) => {
                        const color = EXPENSE_COLORS[label] || SOURCE_COLORS[label] || '#64748b';
                        return { label, value, color };
                    })
                    .sort((a, b) => b.value - a.value);
            }, [filteredSales]);

            const exportYearlyData = () => {
                const yearlyData = sales.filter(s => new Date(s.date).getFullYear() === filter.year);
                if (yearlyData.length === 0) return alert('해당 연도의 데이터가 없습니다.');
                const blob = new Blob([JSON.stringify(yearlyData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `clev-sales-${filter.year}-archive.json`;
                a.click();
            };

            const exportData = () => {
                const blob = new Blob([JSON.stringify(sales, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `clev-sales-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (Array.isArray(data)) {
                            importData(data);
                            alert('데이터를 성공적으로 불러왔습니다.');
                        }
                    } catch (err) { alert('파일이 올바르지 않습니다.'); }
                };
                reader.readAsText(file);
            };

            if (view === 'start') {
                return <StartPage onLaunch={() => setView('dashboard')} stats={startStats} />;
            }

            return (
                <>
                    <div className="min-h-screen px-6 py-12 md:px-12 lg:px-24 animate-fade-up">
                        {/* Header */}
                        <header className="flex flex-col md:flex-row justify-between items-center mb-16 gap-8 animate-fade-up">
                        <div className="flex items-center space-x-4">
                            <button onClick={() => setView('start')} className="mr-4 px-5 py-3 bg-blue-600/10 hover:bg-blue-600 border border-blue-500/20 hover:border-blue-500 rounded-2xl text-blue-400 hover:text-white transition-all shadow-lg hover:shadow-blue-500/25 active:scale-95 flex items-center gap-2 group" title="첫 페이지로 돌아가기">
                                <Icon name="home" size={18} className="group-hover:-translate-x-0.5 transition-transform" />
                                <span className="text-xs font-black uppercase tracking-widest">Home</span>
                            </button>
                            <div className="w-16 h-16 flex items-center justify-center p-2 overflow-hidden">
                                <img src="assets/logo.png" alt="CLEV" className="w-full h-full object-contain" />
                            </div>
                            <div>
                                <h1 className="text-3xl font-brand font-black text-white tracking-tighter">CLEV <span className="font-light text-gray-500">SALES</span></h1>
                                <p className="text-[10px] text-gray-500 font-bold tracking-[0.3em] uppercase">Premium Asset Management</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex bg-white/5 p-1 rounded-2xl border border-white/10 mr-4">
                                <button onClick={() => setViewMode('monthly')} className={`px-6 py-2 rounded-xl text-[10px] font-black transition-all ${viewMode === 'monthly' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-400 hover:text-white'}`}>월간 분석</button>
                                <button onClick={() => setViewMode('yearly')} className={`px-6 py-2 rounded-xl text-[10px] font-black transition-all ${viewMode === 'yearly' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-400 hover:text-white'}`}>연간 분석</button>
                            </div>
                            <button onClick={() => setApplyVat(!applyVat)} className={`flex items-center gap-2 px-6 py-3 rounded-2xl border transition-all text-[10px] font-black mr-4 ${applyVat ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-white/5 border-white/10 text-gray-400'}`}>
                                <div className={`w-3 h-3 rounded-full ${applyVat ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]' : 'bg-gray-600'}`}></div>
                                10% 부가세 {applyVat ? '공제 중' : '미적용 (간이)'}
                            </button>
                            <label className="cursor-pointer bg-white/5 hover:bg-white/10 px-6 py-3 rounded-2xl border border-white/10 transition-all text-xs font-black text-gray-400">
                                📥 불러오기 <input type="file" className="hidden" onChange={handleImport} accept=".json" />
                            </label>
                            <button onClick={exportYearlyData} className="bg-blue-500/10 hover:bg-blue-500/20 px-6 py-3 rounded-2xl border border-blue-500/20 transition-all text-xs font-black text-blue-400">📁 {filter.year}년 아카이브 저장</button>
                            <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-2xl font-black text-sm shadow-xl shadow-blue-600/20 active:scale-95 transition-all flex items-center gap-2">
                                <Icon name="plus" size={16} /> 신규 기록
                            </button>
                        </div>
                    </header>

                    {/* Dashboard Cards */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 mb-12 animate-fade-up" style={{ animationDelay: '0.1s' }}>
                        <Card title={selectedDay ? `${filter.month}월 ${selectedDay}일 매출` : viewMode === 'monthly' ? `${filter.month}월 입금액` : `${filter.year}년 총 매출`} value={totalIncome.toLocaleString() + '원'} sub="Gross Total revenue" icon="bar-chart-3" colorClass="from-blue-500 to-blue-700" />
                        <Card title="총 지출 내역" value={totalExpense.toLocaleString() + '원'} sub="Total operational costs" icon="credit-card" colorClass="from-rose-500 to-red-700" />
                        <Card title="순수익 (실제)" value={netProfit.toLocaleString() + '원'} sub={applyVat ? "VAT 10% Included" : "Net After Expenses"} icon="trending-up" colorClass="from-emerald-500 to-teal-700" />
                        <Card title="동일 기간 작업" value={filteredSales.filter(s => (s.type || 'income') === 'income').length + '건'} sub="Finished projects" icon="layers" colorClass="from-gray-700 to-gray-900" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12 animate-fade-up" style={{ animationDelay: '0.2s' }}>
                        {/* Trend Chart */}
                        <div className="lg:col-span-8 glass-card rounded-[2.5rem] p-10">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-xl font-black text-white">{viewMode === 'monthly' ? '수익 및 지출 추이 (6개월)' : `${filter.year}년 월별 금융 현황`}</h2>
                                <div className="text-[10px] text-gray-500 font-bold uppercase tracking-widest flex items-center gap-4">
                                    <div className="flex items-center gap-2"><div className="w-2 h-2 bg-blue-500 rounded-full opacity-30"></div> 매출</div>
                                    <div className="flex items-center gap-2"><div className="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div> 순수익</div>
                                </div>
                            </div>
                            <div className="h-[250px] w-full">
                                <SimpleChart data={chartData} type={viewMode === 'monthly' ? 'line' : 'bar'} />
                            </div>
                        </div>

                        {/* Donut Chart (Lead Source) */}
                        <div className="lg:col-span-4 glass-card rounded-[2.5rem] p-10 flex flex-col">
                            <h2 className="text-xl font-black text-white mb-8">고객 유입 경로</h2>
                            <div className="flex-grow flex items-center justify-center">
                                <DonutChart data={sourceData} />
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12 lg:h-[500px] transition-all duration-500">
                        {/* Premium Calendar Filter */}
                        <div className={`relative transition-all duration-500 h-full ${isTableExpanded ? 'lg:col-span-1' : 'lg:col-span-3'}`}>
                            {/* Toggle Button for Side View */}
                            <button 
                                onClick={() => setIsTableExpanded(!isTableExpanded)}
                                className="absolute -right-4 top-1/2 -translate-y-1/2 z-20 w-8 h-20 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-xl hover:bg-blue-500 transition-all group hidden lg:flex"
                                title={isTableExpanded ? "Close Detail View" : "Open Detail View"}
                            >
                                <Icon name={isTableExpanded ? "chevron-right" : "chevron-left"} size={16} className="group-hover:scale-125 transition-transform" />
                            </button>
                            <PremiumCalendar
                                year={filter.year}
                                month={filter.month}
                                sales={sales}
                                selectedDay={selectedDay}
                                onDateClick={(day) => {
                                    setSelectedDay(day);
                                    setViewMode('monthly');
                                    if (day !== null) {
                                        setIsDayModalOpen(true);
                                    } else {
                                        setIsDayModalOpen(false);
                                    }
                                }}
                                onViewAll={(type) => {
                                    setSelectedDay(null);
                                    setViewMode('monthly');
                                    setIsDayModalOpen(false);
                                    setListLevel(type);
                                    if (type === 'detail') setIsTableExpanded(true);
                                }}
                                onMonthChange={(delta) => {
                                    let newMonth = filter.month + delta;
                                    let newYear = filter.year;
                                    if (newMonth < 1) { newMonth = 12; newYear--; }
                                    if (newMonth > 12) { newMonth = 1; newYear++; }
                                    setFilter({ month: newMonth, year: newYear });
                                    
                                    // Close modal and reset specific day selection on month navigation
                                    // This ensures user sees the new month calendar first
                                    setSelectedDay(null);
                                    setIsDayModalOpen(false);
                                }}
                                onMonthSelect={(selectedYear, selectedMonth) => {
                                    setFilter({ month: selectedMonth, year: selectedYear });
                                    setSelectedDay(null);
                                    setIsDayModalOpen(false);
                                }}
                            />
                            <DayDetailModal isOpen={isDayModalOpen} onClose={() => setIsDayModalOpen(false)} dateString={selectedDay ? `${filter.month}월 ${selectedDay}일` : `${filter.month}월 전체`} items={filteredSales} deleteSale={deleteSale} />
                        </div>

                        {/* Table View */}
                        {isTableExpanded && (
                            <div className="lg:col-span-2 glass-card rounded-[2.5rem] overflow-hidden animate-fade-up flex flex-col h-full">
                                <div className="p-8 lg:p-10 border-b border-white/5 flex justify-between items-center bg-white/5 shrink-0 z-10 relative flex-wrap gap-4">
                                    <div className="flex items-center gap-4">
                                        <button 
                                            onClick={() => setIsTableExpanded(false)}
                                            className="p-2.5 bg-white/5 text-gray-500 rounded-xl hover:text-white hover:bg-white/10 transition-all flex lg:hidden"
                                        >
                                            <Icon name="x" size={16} />
                                        </button>
                                        <h2 className="text-xl font-black text-white">세부 매출 내역 ({selectedDay ? `${filter.month}월 ${selectedDay}일` : viewMode === 'monthly' ? `${filter.month}월` : `${filter.year}년`})</h2>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="relative group flex-1 w-48 md:w-64">
                                            <input 
                                                type="text" 
                                                placeholder="고객/상호명, 내역 검색..."
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                                className="w-full bg-[#0a0a0c]/80 border border-white/10 rounded-xl pl-9 pr-8 py-2 text-xs text-white focus:outline-none focus:border-blue-500 transition-all font-bold placeholder-gray-600 shadow-inner"
                                            />
                                            <Icon name="search" size={14} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-500 transition-colors" />
                                            {searchQuery && (
                                                <button onClick={() => setSearchQuery('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors"><Icon name="x" size={12}/></button>
                                            )}
                                        </div>
                                        <div className="text-[10px] text-gray-500 font-bold uppercase tracking-widest hidden md:block whitespace-nowrap">{filteredSales.length} Records Found</div>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-auto no-scrollbar relative min-h-0">
                                    <table className="w-full border-collapse">
                                        <thead className="bg-[#121215]/95 text-[10px] text-gray-500 font-black uppercase tracking-widest text-left sticky top-0 z-20 shadow-xl backdrop-blur-md">
                                        <tr>
                                            <th className="px-10 py-6">일자</th>
                                            {listLevel === 'detail' && <th className="px-10 py-6">유입 경로</th>}
                                            <th className={`px-10 py-6 ${listLevel === 'simple' ? 'w-full' : ''}`}>{listLevel === 'simple' ? '작업내역 (요약)' : '고객/상호명'}</th>
                                            {listLevel === 'detail' && <th className="px-10 py-6">금액</th>}
                                            {listLevel === 'detail' && <th className="px-10 py-6">상태</th>}
                                            {listLevel === 'detail' && <th className="px-10 py-6 text-right">관리</th>}
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm font-medium">
                                        {filteredSales.length === 0 ? (
                                            <tr><td colSpan="6" className="px-10 py-20 text-center text-gray-600 font-bold italic">데이터가 존재하지 않습니다.</td></tr>
                                        ) : (
                                            filteredSales.map((sale, i) => (
                                                <tr key={sale.id} className="border-b border-white/5 hover:bg-white/5 transition-colors group">
                                                    <td className="px-10 py-6 text-gray-500 font-mono whitespace-nowrap">{sale.date}</td>
                                                    {listLevel === 'detail' && (
                                                    <td className="px-10 py-6">
                                                        <div className="flex flex-wrap gap-1 items-center max-w-[150px]">
                                                            {(sale.type === 'expense' ? (Array.isArray(sale.category) ? sale.category : [sale.category]) : [sale.leadSource || '기타']).map((label, idx) => (
                                                                <div key={idx} className="flex items-center gap-1.5 bg-white/5 px-2 py-1 rounded-lg border border-white/5">
                                                                    <div className="w-1.5 h-1.5 rounded-full" style={{ background: (sale.type === 'expense' ? EXPENSE_COLORS[label] : SOURCE_COLORS[label]) || '#64748b' }}></div>
                                                                    <span className="text-[9px] font-black uppercase text-gray-500 whitespace-nowrap">{label}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </td>
                                                    )}
                                                    <td className={`px-10 py-6 font-black ${listLevel === 'simple' ? 'text-gray-300' : 'text-white'}`}>
                                                        <div className="flex items-center gap-3">
                                                            {sale.client}
                                                            {listLevel === 'simple' && (
                                                                <span className="text-[10px] font-bold text-gray-500 bg-white/5 px-2 py-0.5 rounded-md border border-white/10 uppercase tracking-widest">{sale.type === 'expense' ? '지출' : '매출'}</span>
                                                            )}
                                                            {listLevel === 'simple' && sale.status === '미입금' && (
                                                                <span className="text-[9px] font-bold text-orange-400 bg-orange-500/10 px-2 py-0.5 rounded-md border border-orange-500/20">미입금</span>
                                                            )}
                                                        </div>
                                                    </td>
                                                    {listLevel === 'detail' && (
                                                    <td className={`px-10 py-6 font-bold ${sale.type === 'expense' ? 'text-rose-400' : 'text-blue-400'}`}>
                                                        {sale.type === 'expense' ? '-' : ''}{Number(sale.amount).toLocaleString()}원
                                                    </td>
                                                    )}
                                                    {listLevel === 'detail' && (
                                                    <td className="px-10 py-6">
                                                        <span className={`text-[10px] font-black ${sale.type === 'expense' ? 'text-gray-500' :
                                                                sale.status === '입금완료' ? 'text-emerald-500' :
                                                                    sale.status === '미입금' ? 'text-orange-400' : 'text-gray-500'
                                                            }`}>{sale.type === 'expense' ? '지출' : sale.status}</span>
                                                    </td>
                                                    )}
                                                    {listLevel === 'detail' && (
                                                    <td className="px-10 py-6 text-right">
                                                        <button onClick={() => deleteSale(sale.id)} className="text-gray-700 hover:text-red-500 transition-colors">
                                                            <Icon name="trash-2" size={16} />
                                                        </button>
                                                    </td>
                                                    )}
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        )}
                    </div>

                    {/* Footer */}
                    <footer className="mt-20 text-center opacity-60">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.5em]">CLEV Maestro Admin v1.2 &copy; 2026</p>
                    </footer>
                </div>
                <FormModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} onSave={(data) => addSale({ ...data, id: Date.now() })} />
            </>
        );
    };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
